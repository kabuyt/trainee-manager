<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 実習生管理システム</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>実習生管理システム</h1>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="login-card">
        <h2>ログイン</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginId">ID</label>
            <input type="text" id="loginId" placeholder="ログインID" required>
          </div>
          <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="パスワード" required>
          </div>

          <div id="loginMsg" class="hidden"></div>

          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">ログイン</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // 既にログイン済みならindex.htmlへ
    (async function() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const msgEl = document.getElementById('loginMsg');
      btn.disabled = true;
      btn.textContent = 'ログイン中...';
      msgEl.classList.add('hidden');

      const loginId = document.getElementById('loginId').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      // IDをSupabase Auth用のメール形式に変換
      const email = loginId.includes('@') ? loginId : loginId + '@trainee.local';

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        msgEl.textContent = 'IDまたはパスワードが正しくありません';
        msgEl.className = 'msg-error';
        msgEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'ログイン';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
