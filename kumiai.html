<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育報告書 - GROP VIETNAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:#edf1f7;color:#1e3a5f;padding:20px;max-width:900px;margin:0 auto;font-size:14px}
  .logo{height:32px;margin-bottom:12px;display:block}
  h1{color:#1e3a5f;font-size:20px;margin-bottom:8px;font-weight:700}
  h2{font-size:15px;margin:18px 0 4px;color:#1e3a5f;font-weight:600}
  .meta{color:#64748b;font-size:13px;margin-bottom:16px}
  .toolbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .toolbar label{color:#64748b;font-size:13px}
  .toolbar select{padding:6px 12px;border:1px solid #cbd5e1;border-radius:5px;font-size:14px;background:#fff}
  .btn-dl{display:inline-block;background:#2563eb;color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 2px 6px rgba(37,99,235,0.3);cursor:pointer;border:none;font-family:inherit}
  .btn-dl:hover{background:#1d4ed8}
  .btn-dl:disabled{opacity:.6;cursor:not-allowed}
  .list{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:20px}
  .item{display:flex;align-items:center;padding:12px 20px;border-bottom:1px solid #e8edf5;text-decoration:none;color:inherit;gap:8px}
  .item:last-child{border-bottom:none}
  .item:hover{background:#f1f5f9}
  .num{color:#64748b;font-size:12px;width:30px}
  .sid{color:#1e3a5f;font-weight:600;font-size:12px;font-family:monospace;width:75px}
  .name-jp{font-weight:600;font-size:14px;color:#1e3a5f;min-width:180px}
  .name-en{color:#64748b;font-size:12px;flex:1}
  .month-badge{display:inline-block;background:#dbeafe;color:#1e3a8a;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:8px}
  .month-badge.skip{background:#fee2e2;color:#991b1b}
  .company-group.skip{opacity:.55}
  .company-group.skip .item{pointer-events:none}
  .skip-note{color:#991b1b;font-size:12px;margin-left:10px}
  .company-actions{margin:4px 0 10px}
  .btn-company-dl{background:#2563eb;color:#fff;padding:8px 16px;border-radius:5px;font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:inherit}
  .btn-company-dl:hover{background:#1d4ed8}
  .btn-company-dl:disabled{opacity:.6;cursor:not-allowed}
  .btn-open{background:#e2e8f0;color:#1e3a5f;padding:4px 10px;border-radius:4px;font-size:12px;text-decoration:none}
  .btn-open:hover{background:#cbd5e1}
  .btn.disabled{opacity:.4;cursor:not-allowed}
  .btn{background:#1e3a5f;color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;white-space:nowrap;border:none;cursor:pointer;font-family:inherit;text-decoration:none}
  .btn:hover{background:#0f2440}
  .footer{text-align:center;color:#94a3b8;font-size:11px;margin-top:30px;padding:10px}
  .progress{display:none;background:#e2e8f0;height:6px;border-radius:3px;margin-top:10px;overflow:hidden}
  .progress-bar{height:100%;background:#2563eb;transition:width .3s;width:0%}
  .status-msg{font-size:12px;color:#64748b;margin-top:6px;font-family:monospace}
  .loading{text-align:center;padding:50px;color:#94a3b8}
  .login-box{max-width:400px;margin:80px auto;padding:30px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
  .login-box input{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:5px;font-size:14px}
  .login-box button{width:100%;padding:10px;margin-top:10px;background:#1e3a5f;color:#fff;border:none;border-radius:5px;cursor:pointer}
  .hidden-frame{position:fixed;left:-9999px;top:0;width:900px;height:1400px;border:none}
</style>
</head>
<body>

<div id="login-page" style="display:none">
  <div class="login-box">
    <img src="logo.png" alt="GROP VIETNAM" style="height:40px;margin-bottom:16px">
    <h2 style="color:#1e3a5f;font-size:18px;margin-bottom:8px">教育報告書 閲覧</h2>
    <p style="color:#64748b;font-size:13px;margin-bottom:12px">ログインしてください</p>
    <input type="email" id="login-email" placeholder="メールアドレス">
    <input type="password" id="login-pass" placeholder="パスワード">
    <button onclick="doLogin()">ログイン</button>
    <p id="login-error" style="color:#e74c3c;margin-top:8px;font-size:13px"></p>
  </div>
</div>

<div id="main-page" style="display:none">
  <img src="logo.png" alt="GROP VIETNAM" class="logo">
  <h1 id="title">教育報告書一覧</h1>
  <p class="meta" id="meta">読み込み中...</p>

  <div class="toolbar">
    <label>報告月度:
      <select id="reportMonth" onchange="render()"></select>
    </label>
  </div>
  <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-msg" id="status"></div>

  <div id="list"><div class="loading">読み込み中...</div></div>

  <div class="footer">GROP VIETNAM CO., LTD · 日本語教育報告書</div>
</div>

<iframe id="renderFrame" class="hidden-frame" sandbox="allow-same-origin allow-scripts"></iframe>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10/dist/html2pdf.bundle.min.js"></script>
<script src="config.js"></script>
<script>
// 組合スラッグ→表示名マッピング
const KUMIAI_MAP = {
  globalway: 'グローバルウェイ協同組合',
  cic: 'CIC協同組合',
  hiroshimaworld: '広島ワールド協同組合',
  akane: 'AKANE',
};

const params = new URLSearchParams(location.search);
const kumiaiSlug = params.get('k') || '';
const kumiaiName = KUMIAI_MAP[kumiaiSlug] || kumiaiSlug;

let _trainees = [];

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; return; }
  location.reload();
}

// 教育月計算: 報告月度に受験したテストのtest_name から推定
// 例: test1 を 2026-04 に受験 → 4月度 月1
// 該当月にテストが無い実習生は対象外
function calcEducationMonthFromTest(traineeTestResults, reportYear, reportMonth) {
  // reportMonthは1-12
  const ym = `${reportYear}-${String(reportMonth).padStart(2,'0')}`;
  const r = traineeTestResults.find(x => (x.test_date || '').startsWith(ym));
  if (!r) return null;
  const m = (r.test_name || '').match(/test(\d+)/);
  if (!m) return null;
  const n = parseInt(m[1], 10);
  return (n >= 1 && n <= 8) ? n : null;
}

function populateReportMonthSelect() {
  const sel = document.getElementById('reportMonth');
  const now = new Date();
  const cur = { y: now.getFullYear(), m: now.getMonth() + 1 };
  // 現在月 + 前後6ヶ月
  const options = [];
  for (let i = 6; i >= -2; i--) {
    const d = new Date(cur.y, cur.m - 1 - i, 1);
    options.push({ y: d.getFullYear(), m: d.getMonth() + 1 });
  }
  sel.innerHTML = options.map(o =>
    `<option value="${o.y}-${String(o.m).padStart(2,'0')}">${o.y}年${o.m}月度</option>`
  ).join('');
  sel.value = `${cur.y}-${String(cur.m).padStart(2,'0')}`;
}

async function init() {
  if (!kumiaiSlug || !KUMIAI_MAP[kumiaiSlug]) {
    document.body.innerHTML = '<div class="loading">URL に組合が指定されていません<br>例: ?k=globalway</div>';
    return;
  }
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    document.getElementById('login-page').style.display = 'block';
    return;
  }
  document.getElementById('main-page').style.display = 'block';
  document.title = `教育報告書 - ${kumiaiName}`;
  document.getElementById('title').textContent = `教育報告書一覧　${kumiaiName}`;
  populateReportMonthSelect();

  const { data: trainees } = await supabase
    .from('trainees')
    .select('id,student_id,name_katakana,name_romaji,class_group,company,supervising_org,training_start_date')
    .eq('supervising_org', kumiaiName)
    .order('student_id');
  _trainees = trainees || [];

  // 全員分のテスト結果を取得
  if (_trainees.length) {
    const ids = _trainees.map(t => t.id);
    const { data: results } = await supabase
      .from('test_results')
      .select('trainee_id,test_name,test_date')
      .in('trainee_id', ids)
      .order('test_date', { ascending: true });
    const byTrainee = {};
    (results || []).forEach(r => {
      if (!byTrainee[r.trainee_id]) byTrainee[r.trainee_id] = [];
      byTrainee[r.trainee_id].push(r);
    });
    _trainees.forEach(t => { t._tests = byTrainee[t.id] || []; });
  }
  render();
}

function render() {
  const [ry, rm] = document.getElementById('reportMonth').value.split('-').map(Number);
  // 各学生の教育月を計算（報告月度内に受験したテスト → そのテスト番号 = 教育月）
  _trainees.forEach(t => {
    t._eduMonth = calcEducationMonthFromTest(t._tests || [], ry, rm);
  });
  const reportable = _trainees.filter(t => t._eduMonth !== null);
  const skipped = _trainees.filter(t => t._eduMonth === null);
  document.getElementById('meta').textContent =
    `${ry}年${rm}月度報告 · 対象 ${reportable.length}名 / ${new Set(reportable.map(t=>t.company)).size}社` +
    (skipped.length ? ` (対象外 ${skipped.length}名：この月に受験なし)` : '');

  if (_trainees.length === 0) {
    document.getElementById('list').innerHTML = '<div class="loading">該当者なし</div>';
    return;
  }

  // 会社別グループ化（対象・対象外両方）
  const byCompany = {};
  _trainees.forEach(t => {
    const c = t.company || '(未設定)';
    if (!byCompany[c]) byCompany[c] = [];
    byCompany[c].push(t);
  });

  let html = '';
  Object.entries(byCompany).forEach(([company, arr]) => {
    // 会社内の学生の教育月（全員同じ開始日なら揃う）
    const monthsInCompany = [...new Set(arr.map(t => t._eduMonth))];
    const allSkipped = monthsInCompany.every(m => m === null);
    const companyClass = allSkipped ? 'company-group skip' : 'company-group';

    let badge;
    if (allSkipped) {
      badge = `<span class="month-badge skip">対象外</span><span class="skip-note">（この月に受験履歴なし）</span>`;
    } else if (monthsInCompany.length === 1 && monthsInCompany[0] !== null) {
      badge = `<span class="month-badge">${monthsInCompany[0]}ヶ月目</span>`;
    } else {
      // 混在ケース
      const parts = monthsInCompany.filter(m => m !== null).map(m => `${m}ヶ月目`);
      badge = `<span class="month-badge">${parts.join('/')}</span>`;
    }

    // 会社一括DLボタン（対象がいる場合のみ表示）
    const targetCount = arr.filter(x => x._eduMonth !== null).length;
    const companyBulkBtn = (!allSkipped && targetCount > 0)
      ? `<button class="btn-company-dl" onclick="bulkCompany(${JSON.stringify(company).replace(/"/g,'&quot;')})">📥 ${company} 一括ダウンロード (${targetCount}名)</button>`
      : '';

    html += `<div class="${companyClass}"><h2>🏢 ${company}（${arr.length}名）${badge}</h2>${companyBulkBtn ? '<div class="company-actions">'+companyBulkBtn+'</div>' : ''}<div class="list">`;
    arr.forEach((t, i) => {
      const em = t._eduMonth;
      const dataAttr = em ? `data-trainee-id="${t.id}" data-month="${em}" data-name="${(t.name_romaji||'unknown').replace(/[^A-Za-z0-9_]/g,'_')}" data-sid="${t.student_id}" data-company="${company}"` : '';
      const btnClass = em ? 'btn' : 'btn disabled';
      const btnOnclick = em ? `onclick="downloadSingle(this); return false;"` : 'onclick="return false"';
      html += `
        <div class="item" ${dataAttr}>
          <span class="num">${i+1}</span>
          <span class="sid">${t.student_id}</span>
          <span class="name-jp">${t.name_katakana||''}</span>
          <span class="name-en">${t.name_romaji||''}</span>
          ${em ? `<a href="report.html?id=${t.id}#m=${em}&ro=1" target="_blank" class="btn-open">📄 開く</a>` : ''}
          <button class="${btnClass}" ${btnOnclick}>📥 ダウンロード</button>
        </div>`;
    });
    html += '</div></div>';
  });
  document.getElementById('list').innerHTML = html;
}

// 個別PDFをiframeで描画→PDF化して返す
async function renderPdfBlob(traineeId, month) {
  const frame = document.getElementById('renderFrame');
  frame.src = `report.html?id=${traineeId}#m=${month}&bulk=1&ro=1`;
  await new Promise((resolve, reject) => {
    const onLoad = () => {
      frame.removeEventListener('load', onLoad);
      setTimeout(resolve, 4500);
    };
    frame.addEventListener('load', onLoad);
    setTimeout(() => reject(new Error('timeout')), 30000);
  });
  const doc = frame.contentDocument;
  const reportPage = doc.getElementById('reportPage');
  if (!reportPage) throw new Error('reportPage not found');
  return await html2pdf().set({
    margin: [8, 8, 8, 8],
    image: { type: 'jpeg', quality: 0.95 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
  }).from(reportPage).outputPdf('blob');
}

function fileNameOf(t) {
  const nm = (t.name_romaji || 'unknown').replace(/[^A-Za-z0-9_]/g, '_');
  return `${t.student_id}_${nm}.pdf`;
}

// 個別ダウンロード
async function downloadSingle(btnEl) {
  const row = btnEl.closest('.item');
  const tid = row.dataset.traineeId;
  const month = parseInt(row.dataset.month, 10);
  const sid = row.dataset.sid;
  const nm = row.dataset.name;
  const origText = btnEl.textContent;
  btnEl.disabled = true;
  btnEl.textContent = '⏳';
  try {
    const blob = await renderPdfBlob(tid, month);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${sid}_${nm}.pdf`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (err) {
    alert('ダウンロード失敗: ' + err.message);
  }
  btnEl.disabled = false;
  btnEl.textContent = origText;
  document.getElementById('renderFrame').src = 'about:blank';
}

// 企業別一括
async function bulkCompany(companyName) {
  const [ry, rm] = document.getElementById('reportMonth').value.split('-').map(Number);
  const targets = _trainees.filter(t => t.company === companyName && t._eduMonth !== null);
  if (targets.length === 0) { alert('対象者なし'); return; }

  // クリックされたボタン特定（会社名で検索）
  const btns = [...document.querySelectorAll('.btn-company-dl')];
  const btn = btns.find(b => b.textContent.includes(companyName));
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 生成中...'; }

  const prog = document.getElementById('progress');
  const bar = document.getElementById('progressBar');
  const status = document.getElementById('status');
  prog.style.display = 'block';
  bar.style.width = '0%';

  const zip = new JSZip();
  for (let i = 0; i < targets.length; i++) {
    const t = targets[i];
    status.textContent = `[${i+1}/${targets.length}] ${t.student_id} ${t.name_romaji||''} (${t._eduMonth}ヶ月目)`;
    try {
      const blob = await renderPdfBlob(t.id, t._eduMonth);
      zip.file(fileNameOf(t), blob);
    } catch (err) {
      status.textContent = `✗ ${t.student_id}: ${err.message}`;
      console.error(t.student_id, err);
    }
    bar.style.width = `${Math.round((i+1)/targets.length*100)}%`;
  }
  status.textContent = 'ZIP生成中...';
  const content = await zip.generateAsync({ type: 'blob' });
  const dateStr = `${ry}${String(rm).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = `教育報告書_${companyName}_${dateStr}.zip`;
  a.click();
  URL.revokeObjectURL(a.href);
  status.textContent = '✓ ダウンロード完了';
  if (btn) { btn.disabled = false; btn.textContent = origText; }
  document.getElementById('renderFrame').src = 'about:blank';
}

init();
</script>
</body>
</html>
