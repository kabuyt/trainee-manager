<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 | 実習生管理システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>実習生管理システム</h1>
      <nav>
        <a href="index.html">一覧</a>
        <a href="register.html" class="active">新規登録</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card">
        <h2>実習生 新規登録</h2>

        <form id="registerForm">
          <section class="form-section">
            <h3>基本情報</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="nameRomaji">名前（ローマ字） <span class="required">*</span></label>
                <input type="text" id="nameRomaji" placeholder="NGUYEN THI MAI" required>
              </div>
              <div class="form-group">
                <label for="nameKatakana">名前（カタカナ）</label>
                <input type="text" id="nameKatakana" placeholder="グエン ティ マイ">
              </div>
              <div class="form-group">
                <label for="company">会社名 <span class="required">*</span></label>
                <input type="text" id="company" placeholder="株式会社〇〇" required>
              </div>
              <div class="form-group">
                <label for="classGroup">クラス</label>
                <input type="text" id="classGroup" placeholder="GR1">
              </div>
              <div class="form-group">
                <label for="birthDate">生年月日</label>
                <input type="date" id="birthDate">
              </div>
              <div class="form-group">
                <label for="gender">性別</label>
                <select id="gender">
                  <option value="">-- 選択 --</option>
                  <option value="男">男</option>
                  <option value="女">女</option>
                </select>
              </div>
              <div class="form-group">
                <label for="arrivalDate">入国日</label>
                <input type="date" id="arrivalDate">
              </div>
              <div class="form-group">
                <label for="stayPeriod">在留期間</label>
                <input type="text" id="stayPeriod" placeholder="3年">
              </div>
              <div class="form-group form-group-full">
                <label for="photo">顔写真</label>
                <input type="file" id="photo" accept="image/*" class="file-input">
                <div id="photoPreview" class="photo-preview"></div>
              </div>
            </div>
          </section>

          <section class="form-section">
            <h3>テスト結果（任意）</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="testName">テスト名</label>
                <input type="text" id="testName" placeholder="第1-4課 月間テスト" value="第1-4課 月間テスト">
              </div>
              <div class="form-group">
                <label for="testDate">実施日</label>
                <input type="date" id="testDate">
              </div>
              <div class="form-group">
                <label for="scoreVocab">文字・語彙</label>
                <input type="number" id="scoreVocab" placeholder="0" min="0" max="100">
              </div>
              <div class="form-group">
                <label for="scoreGrammar">文法</label>
                <input type="number" id="scoreGrammar" placeholder="0" min="0" max="100">
              </div>
              <div class="form-group">
                <label for="scoreListening">聴解</label>
                <input type="number" id="scoreListening" placeholder="0" min="0" max="100">
              </div>
              <div class="form-group">
                <label for="scoreConversation">会話</label>
                <input type="number" id="scoreConversation" placeholder="0" min="0" max="100">
              </div>
            </div>
          </section>

          <div id="formMsg" class="hidden"></div>

          <div class="form-actions">
            <a href="index.html" class="btn btn-secondary">キャンセル</a>
            <button type="submit" class="btn btn-primary" id="submitBtn">登録する</button>
          </div>
          <p class="form-note">※ 顔写真の推奨サイズ：240×320px（3:4比率）、JPEG、2MB以下</p>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    (async function() {
      const auth = await checkAuth();
      if (!auth) return;
      setupAuthUI();
    })();

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      await registerTrainee();
    });

    // 写真プレビュー
    document.getElementById('photo').addEventListener('change', function(e) {
      const preview = document.getElementById('photoPreview');
      preview.innerHTML = '';
      const file = e.target.files[0];
      if (file) {
        if (file.size > 2 * 1024 * 1024) {
          preview.innerHTML = '<span class="msg-error">ファイルサイズは2MB以下にしてください</span>';
          e.target.value = '';
          return;
        }
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.onload = () => URL.revokeObjectURL(img.src);
        preview.appendChild(img);
      }
    });
  </script>
</body>
</html>
