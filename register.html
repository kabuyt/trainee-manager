<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 | 実習生管理システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>実習生管理システム</h1>
      <nav>
        <a href="index.html">一覧</a>
        <a href="register.html" class="active">新規登録</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="card">
        <h2>実習生 新規登録</h2>

        <form id="registerForm">
          <div id="orgSelectGroup" class="form-group hidden" style="margin-bottom:20px">
            <label for="orgSelect">教育機関 <span class="required">*</span></label>
            <select id="orgSelect">
              <option value="">-- 教育機関を選択 --</option>
            </select>
          </div>

          <section class="form-section">
            <h3>基本情報</h3>
            <div class="form-grid">
              <div class="form-group">
                <label for="nameRomaji">名前（ローマ字） <span class="required">*</span></label>
                <input type="text" id="nameRomaji" placeholder="NGUYEN THI MAI" required>
              </div>
              <div class="form-group">
                <label for="nameKatakana">名前（カタカナ）</label>
                <input type="text" id="nameKatakana" placeholder="グエン ティ マイ">
              </div>
              <div class="form-group">
                <label for="company">会社名 <span class="required">*</span></label>
                <input type="text" id="company" placeholder="株式会社〇〇" required>
              </div>
              <div class="form-group">
                <label for="classGroup">期 <span class="required">*</span></label>
                <select id="classGroup" required>
                  <option value="">-- 選択 --</option>
                  <option value="1期生">1期生</option>
                  <option value="2期生">2期生</option>
                  <option value="3期生">3期生</option>
                  <option value="4期生">4期生</option>
                  <option value="5期生">5期生</option>
                  <option value="6期生">6期生</option>
                  <option value="7期生">7期生</option>
                  <option value="8期生">8期生</option>
                  <option value="9期生">9期生</option>
                  <option value="10期生">10期生</option>
                  <option value="11期生">11期生</option>
                  <option value="12期生">12期生</option>
                  <option value="13期生">13期生</option>
                  <option value="14期生">14期生</option>
                  <option value="15期生">15期生</option>
                </select>
              </div>
              <div class="form-group">
                <label for="birthDate">生年月日</label>
                <input type="date" id="birthDate">
              </div>
              <div class="form-group">
                <label for="gender">性別</label>
                <select id="gender">
                  <option value="">-- 選択 --</option>
                  <option value="男">男</option>
                  <option value="女">女</option>
                </select>
              </div>
              <div class="form-group">
                <label for="trainingStartDate">事前教育開始日</label>
                <input type="date" id="trainingStartDate">
              </div>
              <div class="form-group">
                <label for="arrivalDate">入国予定日</label>
                <input type="date" id="arrivalDate">
              </div>
              <div class="form-group form-group-full">
                <label for="photo">顔写真</label>
                <input type="file" id="photo" accept="image/*" class="file-input">
                <div id="photoPreview" class="photo-preview"></div>
                <p class="form-note" style="text-align:left;margin-top:4px">※ 推奨サイズ：横240×縦320px（3:4比率）、JPEG、2MB以下</p>
              </div>
            </div>
          </section>


          <div id="formMsg" class="hidden"></div>

          <div class="form-actions">
            <a href="index.html" class="btn btn-secondary">キャンセル</a>
            <button type="submit" class="btn btn-primary" id="submitBtn">登録する</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    (async function() {
      const auth = await checkAuth();
      if (!auth) return;
      setupAuthUI();

      // 管理者なら教育機関セレクトを表示
      if (isAdmin()) {
        const { data: orgs } = await supabase.from('organizations').select('*').order('name');
        if (orgs) {
          const group = document.getElementById('orgSelectGroup');
          const sel = document.getElementById('orgSelect');
          group.classList.remove('hidden');
          orgs.forEach(o => {
            const opt = document.createElement('option');
            opt.value = o.id;
            opt.textContent = o.name;
            sel.appendChild(opt);
          });
        }
      }
    })();

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      await registerTrainee();
    });

    // 写真プレビュー
    document.getElementById('photo').addEventListener('change', function(e) {
      const preview = document.getElementById('photoPreview');
      preview.innerHTML = '';
      const file = e.target.files[0];
      if (file) {
        if (file.size > 2 * 1024 * 1024) {
          preview.innerHTML = '<span class="msg-error">ファイルサイズは2MB以下にしてください</span>';
          e.target.value = '';
          return;
        }
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.onload = () => URL.revokeObjectURL(img.src);
        preview.appendChild(img);
      }
    });
  </script>
</body>
</html>
