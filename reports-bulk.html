<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育報告書 一括出力</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f5f6fa;color:#333;font-size:14px;padding:20px}
  h1{color:#1e3a5f;font-size:20px;margin-bottom:16px}
  .nav{background:#2c3e50;color:#fff;padding:10px 16px;display:flex;gap:12px;align-items:center;margin:-20px -20px 16px}
  .nav a{color:#bdc3c7;text-decoration:none;font-size:13px;padding:4px 10px;border-radius:4px}
  .nav a:hover,.nav a.active{background:#34495e;color:#fff}
  .nav h1{font-size:16px}
  .card{background:#fff;padding:16px 20px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .toolbar label{font-size:14px;color:#555}
  .toolbar select{padding:6px 12px;border:1px solid #ccc;border-radius:5px;font-size:14px;min-width:160px}
  .btn{padding:8px 18px;border:none;border-radius:5px;font-size:14px;cursor:pointer;background:#3498db;color:#fff;font-weight:500}
  .btn:hover{background:#2980b9}
  .btn-green{background:#27ae60}
  .btn-green:hover{background:#229954}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .list{margin-top:8px}
  .item{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #eef}
  .item:last-child{border-bottom:none}
  .item .num{color:#888;font-size:12px;width:40px}
  .item .sid{color:#1e3a5f;font-weight:600;width:80px}
  .item .name{flex:1}
  .item .sub{color:#64748b;font-size:12px;margin-left:10px}
  .item .status{font-size:12px;padding:2px 8px;border-radius:10px;margin-left:10px}
  .s-done{background:#d4edda;color:#155724}
  .s-err{background:#f8d7da;color:#721c24}
  .s-wait{background:#fff3cd;color:#856404}
  .progress{background:#e9ecef;height:6px;border-radius:3px;margin-top:10px;overflow:hidden}
  .progress-bar{height:100%;background:#27ae60;transition:width .3s}
  .login-box{max-width:400px;margin:80px auto;padding:30px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
  .login-box input{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:5px;font-size:14px}
  .login-box button{width:100%;padding:10px;margin-top:10px;background:#2c3e50;color:#fff;border:none;border-radius:5px;cursor:pointer}
  .log{font-family:monospace;font-size:12px;background:#1e293b;color:#d1fae5;padding:10px;border-radius:4px;max-height:200px;overflow:auto;margin-top:10px;display:none}
  .log.show{display:block}
  iframe#renderFrame{position:fixed;left:-9999px;top:0;width:900px;height:1400px;border:none}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-box">
    <h2>📁 教育報告書 一括出力</h2>
    <p style="color:#777;font-size:13px;margin-bottom:16px">管理者ログインしてください</p>
    <input type="email" id="login-email" placeholder="メールアドレス" value="admin@trainee.local">
    <input type="password" id="login-pass" placeholder="パスワード">
    <button onclick="doLogin()">ログイン</button>
    <p id="login-error" style="color:#e74c3c;margin-top:8px"></p>
  </div>
</div>

<div id="main-page" style="display:none">
  <div class="nav">
    <h1>📁 教育報告書 一括出力</h1>
    <a href="index.html">学生一覧</a>
    <a href="test-results.html">成績</a>
    <a href="reports-bulk.html" class="active">一括出力</a>
    <span style="margin-left:auto;font-size:13px" id="user-email"></span>
    <button class="btn" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <label>監理団体（組合）:
        <select id="filter-kumiai" onchange="updateList()">
          <option value="">-- 選択 --</option>
        </select>
      </label>
      <label>会社:
        <select id="filter-company" onchange="updateList()">
          <option value="">(任意・全社)</option>
        </select>
      </label>
      <label>クラス:
        <select id="filter-class" onchange="updateList()">
          <option value="">(任意・全クラス)</option>
        </select>
      </label>
      <label>月:
        <select id="filter-month" onchange="updateList()">
          <option value="1">1ヶ月目</option>
          <option value="2">2ヶ月目</option>
          <option value="3">3ヶ月目</option>
          <option value="4">4ヶ月目</option>
          <option value="5">5ヶ月目</option>
          <option value="6">6ヶ月目</option>
          <option value="7">7ヶ月目</option>
          <option value="8">8ヶ月目</option>
        </select>
      </label>
      <span style="margin-left:auto">
        <button class="btn btn-green" onclick="generateZip()" id="genBtn">📥 一括PDFダウンロード (ZIP)</button>
      </span>
    </div>
  </div>

  <div class="card">
    <h3 style="font-size:15px;margin-bottom:10px;color:#1e3a5f">対象実習生 <span id="count" style="color:#888;font-weight:normal">- 名</span></h3>
    <div class="list" id="list"></div>
    <div class="progress" id="progress" style="display:none"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="log" id="log"></div>
  </div>

</div>

<iframe id="renderFrame" sandbox="allow-same-origin allow-scripts"></iframe>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10/dist/html2pdf.bundle.min.js"></script>
<script src="config.js"></script>
<script>
let _trainees = [];

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = error.message; return; }
  const { data: profile } = await supabase.from('user_profiles').select('role').eq('id', data.user.id).single();
  if (!profile || profile.role !== 'admin') {
    errEl.textContent = '管理者アカウントではありません';
    await supabase.auth.signOut();
    return;
  }
  showMain(email);
}

async function doLogout() { await supabase.auth.signOut(); location.reload(); }

async function showMain(email) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'block';
  document.getElementById('user-email').textContent = email;
  await loadTrainees();
}

async function loadTrainees() {
  const { data } = await supabase.from('trainees').select('id,student_id,name_katakana,name_romaji,class_group,company,supervising_org').order('student_id');
  _trainees = data || [];
  // 監理団体（組合）選択肢
  const kumiais = [...new Set(_trainees.map(t => t.supervising_org).filter(Boolean))].sort();
  const kumiaiSel = document.getElementById('filter-kumiai');
  kumiais.forEach(k => {
    const o = document.createElement('option'); o.value = k; o.textContent = k;
    kumiaiSel.appendChild(o);
  });
  updateList();
}

function updateList() {
  const kumiai = document.getElementById('filter-kumiai').value;
  const company = document.getElementById('filter-company').value;
  const cls = document.getElementById('filter-class').value;
  const month = document.getElementById('filter-month').value;
  const list = document.getElementById('list');

  // 選択中の組合の中で使われている企業を会社ドロップダウンに
  const underKumiai = kumiai ? _trainees.filter(t => t.supervising_org === kumiai) : [];
  const companies = [...new Set(underKumiai.map(t => t.company).filter(Boolean))].sort();
  const companySel = document.getElementById('filter-company');
  const curCompany = companySel.value;
  companySel.innerHTML = '<option value="">(任意・全社)</option>';
  companies.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    companySel.appendChild(o);
  });
  if (companies.includes(curCompany)) companySel.value = curCompany;

  // 組合 + 会社 でクラス絞り込み
  const filteredForClass = underKumiai.filter(t => !company || t.company === company);
  const classes = [...new Set(filteredForClass.map(t => t.class_group).filter(Boolean))].sort();
  const classSel = document.getElementById('filter-class');
  const curCls = classSel.value;
  classSel.innerHTML = '<option value="">(任意・全クラス)</option>';
  classes.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    classSel.appendChild(o);
  });
  if (classes.includes(curCls)) classSel.value = curCls;

  if (!kumiai) {
    list.innerHTML = '<div style="padding:20px;color:#888;text-align:center">監理団体（組合）を選択してください</div>';
    document.getElementById('count').textContent = '- 名';
    return;
  }
  const matched = underKumiai.filter(t => (!company || t.company === company) && (!cls || t.class_group === cls));
  document.getElementById('count').textContent = `${matched.length} 名 / ${new Set(matched.map(t=>t.company)).size} 社`;
  if (matched.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#888;text-align:center">該当者なし</div>';
    return;
  }
  // 会社ごとにグループ化して表示
  const byCompany = {};
  matched.forEach(t => {
    const c = t.company || '(未設定)';
    if (!byCompany[c]) byCompany[c] = [];
    byCompany[c].push(t);
  });
  let html = '';
  Object.entries(byCompany).forEach(([c, arr]) => {
    html += `<div style="background:#eef2f7;padding:6px 14px;font-size:12px;color:#1e3a5f;font-weight:600;margin-top:4px">🏢 ${c} (${arr.length}名)</div>`;
    arr.forEach((t, i) => {
      html += `
        <div class="item" data-id="${t.id}">
          <span class="num">${i+1}</span>
          <span class="sid">${t.student_id}</span>
          <span class="name">${t.name_katakana||''} <span class="sub">${t.name_romaji||''}</span></span>
          <span class="sub">${t.class_group||''}</span>
          <a href="report.html?id=${t.id}#m=${month}" target="_blank" class="sub" style="color:#3498db;text-decoration:underline">報告書を見る</a>
          <span class="status s-wait" id="st-${t.id}">未処理</span>
        </div>`;
    });
  });
  list.innerHTML = html;

  // ボタンラベル更新
  const btn = document.getElementById('genBtn');
  if (btn) {
    if (company) {
      btn.textContent = `📥 ${company} の報告書を一括ダウンロード (ZIP)`;
    } else if (Object.keys(byCompany).length > 1) {
      btn.textContent = `📥 ${kumiai} 全${Object.keys(byCompany).length}社まとめて一括ダウンロード (ZIP)`;
    } else {
      btn.textContent = `📥 一括PDFダウンロード (ZIP)`;
    }
  }
}

function setStatus(tid, text, cls) {
  const el = document.getElementById('st-' + tid);
  if (el) { el.textContent = text; el.className = 'status ' + cls; }
}

function logLine(text) {
  const log = document.getElementById('log');
  log.classList.add('show');
  log.textContent += text + '\n';
  log.scrollTop = log.scrollHeight;
}

async function generateZip() {
  const kumiai = document.getElementById('filter-kumiai').value;
  const company = document.getElementById('filter-company').value;
  const cls = document.getElementById('filter-class').value;
  const month = document.getElementById('filter-month').value;
  if (!kumiai) { alert('監理団体（組合）を選択してください'); return; }
  const matched = _trainees.filter(t =>
    t.supervising_org === kumiai
    && (!company || t.company === company)
    && (!cls || t.class_group === cls)
  );
  if (matched.length === 0) { alert('該当者なし'); return; }
  // 会社が複数なら確認
  const companies = [...new Set(matched.map(t => t.company || '(未設定)'))];
  if (!company && companies.length > 1) {
    if (!confirm(`${companies.length}社（${matched.length}名）の報告書をまとめて出力します。続行しますか？`)) return;
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  const bar = document.getElementById('progressBar');
  document.getElementById('progress').style.display = 'block';
  document.getElementById('log').textContent = '';

  const zip = new JSZip();
  const frame = document.getElementById('renderFrame');
  const session = (await supabase.auth.getSession()).data.session;

  for (let i = 0; i < matched.length; i++) {
    const t = matched[i];
    setStatus(t.id, '処理中...', 's-wait');
    logLine(`[${i+1}/${matched.length}] ${t.student_id} ${t.name_romaji||t.name_katakana||''}`);
    try {
      // iframeに report.html を読み込んで月を切替
      frame.src = `report.html?id=${t.id}#m=${month}&bulk=1`;
      await new Promise((resolve, reject) => {
        const onLoad = () => {
          frame.removeEventListener('load', onLoad);
          // データ読込 + 月切替完了を待つ（5秒）
          setTimeout(resolve, 5000);
        };
        frame.addEventListener('load', onLoad);
        setTimeout(() => reject(new Error('timeout')), 30000);
      });

      const doc = frame.contentDocument;
      if (!doc) throw new Error('iframe content inaccessible');
      const reportPage = doc.getElementById('reportPage');
      if (!reportPage) throw new Error('reportPage not found');

      // PDF 生成（A4, mm）
      const safeName = (t.name_romaji||'unknown').replace(/[^A-Za-z0-9_]/g,'_');
      const fname = `${t.student_id}_${safeName}.pdf`;
      // 会社別にサブフォルダ分け
      const folder = (t.company || '(未設定)').replace(/[\\/:*?"<>|]/g, '_');
      const zipPath = `${folder}/${fname}`;
      const opt = {
        margin: 0,
        filename: fname,
        image: { type: 'jpeg', quality: 0.95 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          windowWidth: 794,  // A4 width @ 96dpi
          letterRendering: true
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },
        pagebreak: { mode: ['css', 'legacy'], before: '.page-break-before' }
      };
      const pdfBlob = await html2pdf().set(opt).from(reportPage).outputPdf('blob');
      zip.file(zipPath, pdfBlob);
      setStatus(t.id, '完了', 's-done');
      logLine(`  ✓ ${zipPath}`);
    } catch (err) {
      setStatus(t.id, 'エラー', 's-err');
      logLine(`  ✗ ERROR: ${err.message}`);
      console.error(err);
    }
    bar.style.width = `${Math.round((i+1)/matched.length*100)}%`;
  }

  // ZIP 生成・ダウンロード
  logLine('ZIP生成中...');
  const content = await zip.generateAsync({ type: 'blob' });
  const dateStr = new Date().toISOString().slice(0,7).replace('-','');
  const groupLabel = company || kumiai;
  const zipName = `教育報告書_${groupLabel}_${dateStr}_${month}ヶ月目.zip`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = zipName;
  a.click();
  URL.revokeObjectURL(a.href);
  logLine(`✓ ダウンロード: ${zipName}`);

  btn.disabled = false;
  btn.textContent = '📥 一括PDFダウンロード (ZIP)';
  frame.src = 'about:blank';
}

// 自動ログイン
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const { data: profile } = await supabase.from('user_profiles').select('role').eq('id', session.user.id).single();
    if (profile && profile.role === 'admin') {
      showMain(session.user.email);
    }
  }
})();
</script>
</body>
</html>
